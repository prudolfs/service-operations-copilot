<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0d14" />
    <title>Offline · Service Ops</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0d14;
        color: #e7ebf3;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top, 0) 24px env(safe-area-inset-bottom, 0);
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #87b6ff;
        font-weight: 600;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }
      p {
        color: #9aa3b6;
        line-height: 1.55;
        margin: 0 0 28px;
        font-size: 16px;
      }
      button {
        background: #2f6cff;
        color: #fff;
        border: 0;
        padding: 14px 28px;
        border-radius: 14px;
        font: inherit;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover {
        background: #1f50e6;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Service Ops</div>
      <h1>You're offline</h1>
      <p>Reconnect to continue. Nothing was lost — your data is safe.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
